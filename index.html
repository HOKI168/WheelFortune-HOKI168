<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOKI168 - Wheel of Fortune</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e0d3a 0%, #0f0518 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 80px;
            padding: 40px;
        }

        .wheel-wrapper {
            position: relative;
            width: 550px;
            height: 550px;
        }

        .wheel-border {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #ffd700 0deg,
                #ffed4e 30deg,
                #daa520 60deg,
                #ffd700 90deg,
                #ffed4e 120deg,
                #daa520 150deg,
                #ffd700 180deg,
                #ffed4e 210deg,
                #daa520 240deg,
                #ffd700 270deg,
                #ffed4e 300deg,
                #daa520 330deg,
                #ffd700 360deg
            );
            padding: 15px;
            box-shadow: 
                0 0 60px rgba(255, 215, 0, 0.6),
                0 0 100px rgba(255, 215, 0, 0.4),
                0 0 150px rgba(255, 215, 0, 0.3),
                inset 0 0 30px rgba(255, 255, 255, 0.3),
                inset 0 0 60px rgba(255, 215, 0, 0.2);
            z-index: 10;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% {
                box-shadow: 
                    0 0 60px rgba(255, 215, 0, 0.6),
                    0 0 100px rgba(255, 215, 0, 0.4),
                    0 0 150px rgba(255, 215, 0, 0.3),
                    inset 0 0 30px rgba(255, 255, 255, 0.3),
                    inset 0 0 60px rgba(255, 215, 0, 0.2);
            }
            50% {
                box-shadow: 
                    0 0 80px rgba(255, 215, 0, 0.8),
                    0 0 120px rgba(255, 215, 0, 0.6),
                    0 0 180px rgba(255, 215, 0, 0.4),
                    inset 0 0 40px rgba(255, 255, 255, 0.4),
                    inset 0 0 80px rgba(255, 215, 0, 0.3);
            }
        }

        .wheel-border::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 0 10px rgba(255, 215, 0, 0.5),
                inset 0 0 10px rgba(255, 215, 0, 0.5);
            pointer-events: none;
        }

        .wheel-border::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.4),
                inset 0 0 20px rgba(255, 215, 0, 0.2);
            pointer-events: none;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .screw {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff 0%, #ffd700 50%, #daa520 100%);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.8), inset 0 0 3px rgba(0, 0, 0, 0.5);
            z-index: 12;
        }

        .wheel-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border-radius: 50%;
            overflow: hidden;
            background: #1a1a2e;
            box-shadow: 
                inset 0 0 50px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(0, 0, 0, 0.5);
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, #000000 0%, #1a1a2e 100%);
            border-radius: 50%;
            border: 5px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: 
                0 0 30px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(255, 215, 0, 0.5),
                inset 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .center-logo {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .center-logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
        }

        .lights {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 15;
            pointer-events: none;
        }

        .light {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #ffd700;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 25px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            text-align: center;
            min-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h3 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            font-weight: 700;
            line-height: 1.3;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            border: 3px solid rgba(255, 215, 0, 0.5);
            border-radius: 50px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
            font-weight: 600;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            transform: scale(1.02);
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #daa520 100%);
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            color: #1a0f2e;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.8);
        }

        button:active:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 25px;
            padding: 25px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            display: none;
            animation: slideIn 0.5s;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a0f2e;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
            border: 3px solid #fff;
            line-height: 1.4;
        }

        .result.show {
            display: block;
            animation: winPulse 0.6s ease-in-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #audioPlayer {
            display: none;
        }

        #prizeSound {
            display: none;
        }
    </style>
</head>
<body>
    <audio id="audioPlayer" preload="auto" loop>
        <source src="MusicLook.mp3" type="audio/mpeg">
    </audio>

    <audio id="prizeSound" preload="auto">
        <source src="SoundEffect.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div class="wheel-border" id="wheelBorder">
                <div class="wheel-container">
                    <canvas id="wheelCanvas"></canvas>
                </div>
                <div class="lights" id="lights"></div>
            </div>
            <div class="center-circle">
                <div class="center-logo">
                    <img src="logohk.png" alt="HOKI168">
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>🎰 Masukkan Kode Tiket 🎰</h3>
            <input type="text" id="codeInput" placeholder="Masukkan Kode">
            <button onclick="spin()" id="spinBtn">🎲 SPIN 🎲</button>
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyD2bVSPx3_9s4lun0JTcbkILVEBgDobQGA",
  authDomain: "wheelfortunehoki168.firebaseapp.com",
  databaseURL: "https://wheelfortunehoki168-default-rtdb.firebaseio.com",
  projectId: "wheelfortunehoki168",
  storageBucket: "wheelfortunehoki168.firebasestorage.app",
  messagingSenderId: "985887787024",
  appId: "1:985887787024:web:66c94bf9d4f2d59329e295"
    
};
        
        const audio = document.getElementById('audioPlayer');
        const prizeSound = document.getElementById('prizeSound');
        
        audio.volume = 0.8;
        prizeSound.volume = 1.;

        document.addEventListener('click', function autoPlay() {
            audio.play().catch(e => console.log('Background audio not played:', e));
            document.removeEventListener('click', autoPlay);
        }, { once: true });

        const prizes = [5000, 10000, 15000, 20000, 50000, 100000, 200000, 500000, 1000000, 3000000];
        const colors = ['#FFD700', '#E0E0E0', '#FF69B4', '#E5E4E2', '#FFD700', '#E0E0E0', '#FF69B4', '#E5E4E2', '#FFD700', '#E0E0E0'];
        
        let currentRotation = 0;
        let isSpinning = false;
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        
        const codes = {
            'edkioA3S': { prize: 5000, used: false },
            'On68VgjB': { prize: 5000, used: false },
            'ZaHkelm': { prize: 5000, used: false },
            'LuckyWin': { prize: 10000, used: false },
            'JackPot15': { prize: 15000, used: false },
            'Winner20': { prize: 20000, used: false },
            'BigWin50': { prize: 50000, used: false },
            'Super100': { prize: 100000, used: false },
            'Mega200': { prize: 200000, used: false },
            'Ultra500': { prize: 500000, used: false },
            'Super1M': { prize: 1000000, used: false },
            'Jackpot3M': { prize: 3000000, used: false },
        };
        
        function setupCanvas() {
            const container = document.querySelector('.wheel-container');
            const size = container.clientWidth;
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            
            ctx.scale(dpr, dpr);
            
            return size;
        }

        let canvasSize = setupCanvas();
        const centerX = canvasSize / 2;
        const centerY = canvasSize / 2;
        let radius = canvasSize / 2;
        const segmentAngle = (2 * Math.PI) / prizes.length;

        window.addEventListener('resize', () => {
            canvasSize = setupCanvas();
            radius = canvasSize / 2;
            drawWheel();
            createLights();
            createScrews();
        });

        function drawWheel() {
            ctx.clearRect(0, 0, canvasSize, canvasSize);
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            
            prizes.forEach((prize, i) => {
                const angle = i * segmentAngle;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + segmentAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i];
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + segmentAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                
                const prizeText = prize.toLocaleString('id-ID');
                ctx.fillText(prizeText, radius - 25, 5);
                ctx.restore();
            });
        }

        function createLights() {
            const lightsContainer = document.getElementById('lights');
            lightsContainer.innerHTML = '';
            
            const wrapperSize = 550;
            const centerX = wrapperSize / 2;
            const centerY = wrapperSize / 2;
            const lightRadius = 263;
            const totalLights = 0;
            
            for (let i = 0; i < totalLights; i++) {
                const light = document.createElement('div');
                light.className = 'light';
                
                const angleDeg = i * (360 / totalLights);
                const angleRad = (angleDeg - 90) * (Math.PI / 180);
                
                const x = centerX + lightRadius * Math.cos(angleRad) - 6;
                const y = centerY + lightRadius * Math.sin(angleRad) - 6;
                
                light.style.left = x + 'px';
                light.style.top = y + 'px';
                light.style.animationDelay = (i * 0.03) + 's';
                
                lightsContainer.appendChild(light);
            }
        }

        function createScrews() {
            const wheelBorder = document.getElementById('wheelBorder');
            const existingScrews = wheelBorder.querySelectorAll('.screw');
            existingScrews.forEach(screw => screw.remove());
            
            const wrapperSize = 550;
            const centerX = wrapperSize / 2;
            const centerY = wrapperSize / 2;
            const screwRadius = 268;
            const totalScrews = 16;
            
            for (let i = 0; i < totalScrews; i++) {
                const screw = document.createElement('div');
                screw.className = 'screw';
                
                const angleDeg = i * (360 / totalScrews);
                const angleRad = (angleDeg - 90) * (Math.PI / 180);
                
                const x = centerX + screwRadius * Math.cos(angleRad) - 5;
                const y = centerY + screwRadius * Math.sin(angleRad) - 5;
                
                screw.style.left = x + 'px';
                screw.style.top = y + 'px';
                
                wheelBorder.appendChild(screw);
            }
        }

        function spin() {
            if (isSpinning) return;
            
            const code = document.getElementById('codeInput').value.trim();
            const resultDiv = document.getElementById('result');
            const spinBtn = document.getElementById('spinBtn');
            
            if (!code) {
                alert('Masukkan kode terlebih dahulu!');
                return;
            }
            
            const codeData = codes[code];
            
            if (!codeData) {
                alert('Kode tidak valid!');
                return;
            }
            
            if (codeData.used) {
                alert('⚠️ Kode ini sudah digunakan!');
                return;
            }
            
            const prize = codeData.prize;
            
            codeData.used = true;
            
            isSpinning = true;
            spinBtn.disabled = true;
            resultDiv.classList.remove('show');
            
            const index = prizes.indexOf(prize);
            const degreesPerSegment = 360 / prizes.length;
            const segmentPosition = index * degreesPerSegment;
            const segmentCenter = segmentPosition + (degreesPerSegment / 2);
            
            let targetRotation = 270 - segmentCenter;
            
            while (targetRotation < 0) {
                targetRotation += 360;
            }
            
            const minSpins = 360 * 5;
            const currentMod = currentRotation % 360;
            
            let rotationDiff = targetRotation - currentMod;
            
            if (rotationDiff < 0) {
                rotationDiff += 360;
            }
            
            if (rotationDiff < minSpins) {
                rotationDiff += minSpins;
            }
            
            const newRotation = currentRotation + rotationDiff;
            currentRotation = newRotation;
            
            const wheelContainer = document.querySelector('.wheel-container');
            wheelContainer.style.transition = 'transform 5s cubic-bezier(0.25, 0.1, 0.25, 1)';
            wheelContainer.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                resultDiv.innerHTML = `🎉 Selamat anda mendapatkan<br>Hadiah ${prize.toLocaleString('id-ID')} 🎉`;
                resultDiv.classList.add('show');
                isSpinning = false;
                spinBtn.disabled = false;
                
                prizeSound.currentTime = 0;
                prizeSound.play().catch(error => {
                    console.log('Error playing prize sound:', error);
                });
            }, 5000);
        }

        drawWheel();
        createLights();
        createScrews();
    </script>
</body>

</html>
