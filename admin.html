<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HOKI168</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #FFD700;
            --secondary-gold: #FFA500;
            --dark-bg: #1a0b2e;
            --card-bg: rgba(45, 27, 78, 0.95);
            --text-light: #ffffff;
            --text-muted: #bbbbbb;
            --danger-color: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(128, 0, 128, 0.1) 0%, transparent 20%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-box {
            width: 700px; /* Sedikit dilebar agar muat waktu */
            background: var(--card-bg);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255, 215, 0, 0.1);
            padding: 40px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        /* LOGIN PAGE */
        #login-page { text-align: center; }
        .login-logo {
            font-size: 32px; font-weight: 700;
            background: linear-gradient(to right, var(--primary-gold), var(--secondary-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .login-subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
        .input-login {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white;
            font-family: 'Poppins', sans-serif; transition: 0.3s;
        }
        .input-login:focus { outline: none; border-color: var(--primary-gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--primary-gold), var(--secondary-gold));
            border: none; border-radius: 8px; color: #000;
            font-weight: 700; font-size: 16px; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-login:hover { transform: scale(1.02); }
        .error-msg { color: var(--danger-color); margin-top: 15px; font-size: 13px; display: none; }

        /* DASHBOARD PAGE */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }
        .header h2 {
            font-size: 24px;
            background: linear-gradient(to right, var(--primary-gold), var(--secondary-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-logout {
            background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color);
            padding: 5px 15px; border-radius: 5px; cursor: pointer;
            font-size: 12px; transition: 0.3s;
        }
        .btn-logout:hover { background: var(--danger-color); color: white; }

        /* Form Input */
        .input-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 12px; color: var(--primary-gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white;
            font-family: 'Poppins', sans-serif; transition: 0.3s;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--primary-gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        .btn-generate {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--primary-gold), var(--secondary-gold));
            border: none; border-radius: 8px; color: #000;
            font-weight: 700; font-size: 16px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; text-transform: uppercase;
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4); }

        .notification {
            margin-top: 15px; padding: 10px;
            background: rgba(0, 255, 128, 0.1); border: 1px solid rgba(0, 255, 128, 0.3);
            border-radius: 8px; color: #00ff80; text-align: center;
            display: none; font-weight: 600; font-size: 14px;
        }

        /* Tabel Database */
        .db-container {
            margin-top: 25px;
            background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden;
        }
        .db-header {
            display: flex; justify-content: space-between; padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
        }
        .db-title { font-weight: 600; color: var(--primary-gold); font-size: 14px; }
        .db-count { font-size: 12px; color: var(--text-muted); }

        .table-scroll { max-height: 220px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 8px; font-size: 10px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); position: sticky; top: 0; }
        td { padding: 10px 8px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ddd; }
        tr:hover { background: rgba(255, 215, 0, 0.05); }

        .badge { padding: 3px 8px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .badge-active { background: rgba(0, 255, 128, 0.2); color: #00ff80; }
        .badge-used { background: rgba(255, 0, 0, 0.2); color: var(--danger-color); }

        .btn-delete {
            background: transparent; border: 1px solid rgba(255, 77, 77, 0.5); color: var(--danger-color);
            padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; transition: 0.2s;
        }
        .btn-delete:hover { background: var(--danger-color); color: white; }

        /* Tombol Aksi Bawah */
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-export {
            flex: 1; padding: 12px;
            background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-light);
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-export:hover { border-color: var(--primary-gold); color: var(--primary-gold); }
        
        .btn-danger-full {
            flex: 1; padding: 12px;
            background: transparent; border: 1px solid rgba(255, 77, 77, 0.5); color: var(--danger-color);
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-danger-full:hover { background: var(--danger-color); color: white; border-color: var(--danger-color); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- HALAMAN LOGIN -->
    <div class="card-box" id="login-page">
        <div class="login-logo">👑 HOKI168</div>
        <div class="login-subtitle">ADMIN PANEL LOGIN</div>
        
        <input type="text" class="input-login" id="user-id" placeholder="User ID" onkeypress="handleLoginEnter(event)">
        <input type="password" class="input-login" id="user-pass" placeholder="Password" onkeypress="handleLoginEnter(event)">
        
        <button class="btn-login" onclick="login()">MASUK</button>
        <div class="error-msg" id="error-msg">ID atau Password salah!</div>
    </div>

    <!-- HALAMAN DASHBOARD -->
    <div class="card-box hidden" id="admin-page">
        <div class="header">
            <h2>👑 Prize Panel</h2>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <!-- Form Generator -->
        <div class="input-row">
            <div class="input-group">
                <label>Username Penerima</label>
                <input type="text" id="username" placeholder="Nama User">
            </div>
            <div class="input-group">
                <label>Jumlah Hadiah</label>
                <select id="prize-select">
                    <option value="5000">5.000</option>
                    <option value="10000">10.000</option>
                    <option value="15000">15.000</option>
                    <option value="20000">20.000</option>
                    <option value="50000">50.000</option>
                    <option value="100000">100.000</option>
                    <option value="200000">200.000</option>
                    <option value="500000">500.000</option>
                    <option value="1000000">1.000.000</option>
                    <option value="3000000">3.000.000</option>
                </select>
            </div>
        </div>
        <button class="btn-generate" onclick="generateCode()">TAMBAH DATABASE BARU</button>
        
        <div class="notification" id="notif">Sukses!</div>

        <!-- Tabel Data -->
        <div class="db-container">
            <div class="db-header">
                <span class="db-title">Database Tiket</span>
                <span class="db-count" id="count-display">0 Items</span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Kode</th>
                            <th>User</th>
                            <th>Hadiah</th>
                            <th>Status</th>
                            <th>Waktu</th> <!-- Kolom Baru -->
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="db-body">
                        <!-- Data muncul sini -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tombol Aksi -->
        <div class="action-buttons">
            <button class="btn-export" onclick="exportData()">📥 EXPORT KE CSV</button>
            <button class="btn-danger-full" onclick="deleteAllCodes()">🗑️ HAPUS SEMUA</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyD2bVSPx3_9s4lun0JTcbkILVEBgDobQGA",
  authDomain: "wheelfortunehoki168.firebaseapp.com",
  databaseURL: "https://wheelfortunehoki168-default-rtdb.firebaseio.com",
  projectId: "wheelfortunehoki168",
  storageBucket: "wheelfortunehoki168.firebasestorage.app",
  messagingSenderId: "985887787024",
  appId: "1:985887787024:web:66c94bf9d4f2d59329e295"
};

        
        
        // ==================== LOGIKA LOGIN ====================
        
        function handleLoginEnter(event) {
            if (event.key === "Enter") login();
        }

        window.onload = function() {
            if(localStorage.getItem('admin_login') === 'true') {
                showDashboard();
            } else {
                showLogin();
            }
        };

        function login() {
            const id = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            
            if(id === 'hoki168' && pass === 'hoki123') {
                localStorage.setItem('admin_login', 'true');
                showDashboard();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('admin_login');
            showLogin();
            document.getElementById('user-id').value = '';
            document.getElementById('user-pass').value = '';
            document.getElementById('error-msg').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('admin-page').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('admin-page').classList.remove('hidden');
            loadData();
        }

        // ==================== LOGIKA DATABASE ====================

        function generateCode() {
            const user = document.getElementById('username').value || 'Guest';
            const prize = document.getElementById('prize-select').value;
            const code = 'HKI-' + Math.random().toString(36).substr(2, 6).toUpperCase();

            // Get Current Time
            const now = new Date().toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });

            let db = JSON.parse(localStorage.getItem('hoki_db')) || [];
            
            // Struktur Data Baru dengan Timestamp
            db.push({ 
                code: code, 
                user: user, 
                prize: parseInt(prize), 
                status: 'active', 
                created_at: now,    // Waktu dibuat
                used_at: '-'        // Waktu dipakai (default '-')
            });
            
            localStorage.setItem('hoki_db', JSON.stringify(db));

            const notif = document.getElementById('notif');
            notif.style.display = 'block';
            notif.innerText = `Sukses! Kode: ${code} dibuat.`;
            notif.style.background = 'rgba(0, 255, 128, 0.1)';
            notif.style.color = '#00ff80';
            notif.style.borderColor = 'rgba(0, 255, 128, 0.3)';
            
            setTimeout(() => notif.style.display = 'none', 3000);
            loadData();
        }

        function deleteCode(code) {
            if(confirm('Hapus kode ini?')) {
                let db = JSON.parse(localStorage.getItem('hoki_db')) || [];
                db = db.filter(item => item.code !== code);
                localStorage.setItem('hoki_db', JSON.stringify(db));
                loadData();
            }
        }

        function deleteAllCodes() {
            if(confirm('PERINGATAN! Anda yakin ingin menghapus SEMUA data tiket?')) {
                localStorage.removeItem('hoki_db');
                loadData();
                const notif = document.getElementById('notif');
                notif.style.display = 'block';
                notif.innerText = "Semua data tiket telah dihapus.";
                notif.style.background = 'rgba(255, 77, 77, 0.1)';
                notif.style.color = '#ff4d4d';
                notif.style.borderColor = 'rgba(255, 77, 77, 0.3)';
                setTimeout(() => notif.style.display = 'none', 3000);
            }
        }

        function loadData() {
            const db = JSON.parse(localStorage.getItem('hoki_db')) || [];
            const tbody = document.getElementById('db-body');
            tbody.innerHTML = '';
            
            document.getElementById('count-display').innerText = db.length + ' Items';

            db.forEach(item => {
                const isUsed = item.status === 'used';
                const statusClass = isUsed ? 'badge-used' : 'badge-active';
                const statusText = isUsed ? 'Terpakai' : 'Aktif';
                const prizeFormatted = item.prize.toLocaleString('id-ID');

                // Tentukan waktu yang ditampilkan di tabel
                // Jika sudah dipakai tampilkan used_at, jika belum tampilkan created_at
                const timeDisplay = isUsed ? (item.used_at || '-') : (item.created_at || '-');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-family: monospace; color: var(--primary-gold);">${item.code}</td>
                    <td>${item.user}</td>
                    <td>${prizeFormatted}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td style="font-size: 10px; color: #aaa;">${timeDisplay}</td>
                    <td><button class="btn-delete" onclick="deleteCode('${item.code}')">Hapus</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportData() {
            let db = JSON.parse(localStorage.getItem('hoki_db')) || [];
            if(db.length === 0) {
                alert("Tidak ada data untuk di-export.");
                return;
            }

            // Header CSV Baru
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Kode,Username,Hadiah,Status,Waktu Dibuat,Waktu Spin Selesai\n";

            db.forEach(item => {
                // Format untuk CSV
                const created = item.created_at || '-';
                const used = item.used_at || '-';
                csvContent += `${item.code},${item.user},${item.prize},${item.status},"${created}","${used}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "data_hoki168.csv");
            document.body.appendChild(link);
            link.click();
        }
    </script>
</body>

</html>
